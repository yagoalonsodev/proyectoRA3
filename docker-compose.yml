# Docker Compose para Apache Airflow
# Imagen: apache/airflow:slim-3.1.8rc2-python3.13

services:
  airflow:
    image: apache/airflow:slim-3.1.8rc2-python3.13
    container_name: airflow
    command: standalone
    # Las variables *_* se leen del archivo .env del mismo directorio
    environment:
      # Dependencias del DAG (S3 + Delta + Postgres/Neon + HTTP)
      _PIP_ADDITIONAL_REQUIREMENTS: >-
        apache-airflow-providers-amazon
        requests
        pandas
        pyarrow
        deltalake
        sqlalchemy
        psycopg[binary]
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      # Usuario yago / contraseña yago (rol Admin)
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "yago:admin"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/config/simple_auth_manager_passwords.json
      # Variables del pipeline (se usan en DAG/código)
      POLYMARKET_BASE_URL: ${POLYMARKET_BASE_URL:-https://gamma-api.polymarket.com}
      POLYMARKET_KEYWORDS: ${POLYMARKET_KEYWORDS:-CSGO,Counter-Strike}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PREFIX: ${S3_PREFIX:-polymarket}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      NEON_DATABASE_URL: ${NEON_DATABASE_URL:-}
      # Permite importar /opt/airflow/src desde los DAGs
      PYTHONPATH: /opt/airflow
      # Logs: carpeta base y que el webserver lea del mismo contenedor (evita 404 en UI)
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__WORKER_LOG_SERVER_ADDRESS: 127.0.0.1
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./sql:/opt/airflow/sql
      - ./logs:/opt/airflow/logs
      - ./config:/opt/airflow/config
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
